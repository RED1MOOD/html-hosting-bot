<!DOCTYPE html> <html lang="ar" dir="rtl"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>OLIVER SMART AI</title> <style> :root { --bg: #050505; --neon: #00ff88; --card: #0d0d0d; --text: #ffffff; } body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; } /* الهيدر */ header { padding: 15px; background: var(--card); border-bottom: 2px solid var(--neon); text-align: center; box-shadow: 0 0 15px var(--neon); } header h1 { margin: 0; font-size: 1.2rem; color: var(--neon); letter-spacing: 2px; } /* منطقة الدردشة */ #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; } .bubble { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 14.5px; line-height: 1.6; animation: slideUp 0.3s ease; } @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } .user { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; } .ai { align-self: flex-end; background: rgba(0, 255, 136, 0.1); border: 1px solid var(--neon); } /* بطاقة المطور */ .dev-card { background: var(--neon); color: #000; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; box-shadow: 0 0 20px var(--neon); margin: 10px 0; } /* صندوق الكود */ .code-block { background: #000; color: #00ff88; padding: 15px; border-radius: 8px; font-family: monospace; border-left: 3px solid #fff; direction: ltr; text-align: left; overflow-x: auto; margin: 10px 0; } /* الإدخال */ .input-area { padding: 20px; background: var(--card); display: flex; gap: 10px; } input { flex: 1; background: #000; border: 1px solid var(--neon); border-radius: 5px; padding: 12px; color: var(--neon); outline: none; } button { background: var(--neon); border: none; padding: 0 25px; border-radius: 5px; font-weight: bold; cursor: pointer; } footer { text-align: center; padding: 5px; font-size: 10px; color: #444; } </style> </head> <body> <header> <h1>OLIVER AI CORE</h1> </header> <div id="chat-flow"> <div class="bubble ai">أهلاً بك! أنا ذكاء أوليفر المتطور. اسألني عن أي شيء وسأحاول إجابتك.</div> </div> <div class="input-area"> <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." autocomplete="off"> <button onclick="processAI()">إرسال</button> </div> <footer> الملف ملك للمطور أوليفر | t.me/Olive_r2 </footer> <script> const chatFlow = document.getElementById('chat-flow'); const input = document.getElementById('userInput'); // "عقل" الذكاء - مصفوفة ردود ذكية const brain = { "سلام": "وعليكم السلام! كيف يمكنني مساعدتك اليوم؟", "مرحبا": "أهلاً بك في نظام أوليفر الذكي، أنا جاهز لخدمتك.", "كيف حالك": "أنا أعمل بكامل طاقتي البرمجية وبأفضل حال، شكراً لسؤالك!", "وقت": "الوقت الآن يعتمد على منطقتك الزمنية، ولكن تذكر أن الوقت من ذهب!", "مساعدة": "بالطبع! يمكنني شرح الأكواد، أو إعطاؤك معلومات عن المطور، أو الدردشة معك.", "اسمك": "أنا نظام ذكاء اصطناعي محلي، ملقب بـ 'نواة أوليفر'.", "تحب": "أنا أحب سطور الكود البرمجية واللون الأخضر النيون!", "كود": "بالطبع! إليك مثال لكود HTML بسيط:\n\n<html><body><h1>أوليفر</h1></body></html>", "برمجة": "البرمجة هي لغة المستقبل، والمطور أوليفر أبدع في تصميمي." }; function processAI() { const text = input.value.trim(); if (!text) return; addMsg(text, 'user'); input.value = ''; setTimeout(() => { const query = text.toLowerCase(); let found = false; // 1. فحص المطور (أولوية) if (query.includes("مطور") || query.includes("صنعك") || query.includes("مبرمج") || query.includes("اوليفر")) { addMsg("إليك هوية من قام ببرمجتي وتطويري:", 'ai'); const card = document.createElement('div'); card.className = 'dev-card'; card.innerHTML = `المطور: أوليفر (Oliver)<br>قناتي: t.me/Olive_r2`; chatFlow.appendChild(card); found = true; } // 2. فحص طلب الكود else if (query.includes("كود") || query.includes("برمجة")) { addMsg("طلبك مجاب! إليك نموذج برمجى احترافي:", 'ai'); const code = document.createElement('div'); code.className = 'code-block'; code.innerText = `// Generated by Oliver AI\nfunction smartSystem() {\n let status = "Active";\n console.log("System is running...");\n}`; chatFlow.appendChild(code); found = true; } // 3. البحث في "عقل" الذكاء عن كلمات مفتاحية else { for (let key in brain) { if (query.includes(key)) { addMsg(brain[key], 'ai'); found = true; break; } } } // 4. إذا لم يجد كلمة مفتاحية (ردود عشوائية ذكية) if (!found) { const randomReplies = [ "سؤال رائع! بصفتي ذكاء اصطناعي، أرى أن هذا الموضوع يحتاج لتفكير عميق.", "فهمت ما تقصده، ولكن هل يمكنك توضيح فكرتك أكثر؟", "أنا أتفق معك في هذا، المطور أوليفر علمني دائماً أن أكون منطقياً.", "هذا مثير للاهتمام! دعنا نتحدث أكثر عن هذا الجانب.", "لقد قمت بتحليل رسالتك، وأعتقد أنك تمتلك نظرة مميزة." ]; const reply = randomReplies[Math.floor(Math.random() * randomReplies.length)]; addMsg(reply, 'ai'); } chatFlow.scrollTop = chatFlow.scrollHeight; }, 800); } function addMsg(text, type) { const d = document.createElement('div'); d.className = `bubble ${type}`; d.textContent = text; chatFlow.appendChild(d); chatFlow.scrollTop = chatFlow.scrollHeight; } input.addEventListener('keypress', (e) => { if (e.key === 'Enter') processAI(); }); </script> </body> </html>
